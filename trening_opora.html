<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>День 1 — Опора | Кинетический интеллект</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg-deep:#020e24; --bg-dark:#061528; --bg-card:#0a1e38; --bg-panel:#091a30;
  --bg-light:#ffffff; --bg-light-warm:#f7f8fc; --bg-light-muted:#eef1f8;
  --blue:#0575a6; --blue-h:#0093d5; --blue-b:#00aaef;
  --blue-soft:rgba(5,117,166,.15); --blue-g:linear-gradient(135deg,#0575a6,#0093d5);
  --coral:#d76060; --coral-d:#972322;
  --coral-g:linear-gradient(180deg,#d76060,#972322);
  --coral-glow:rgba(215,96,96,.3); --coral-soft:rgba(215,96,96,.12);
  --crimson:#7A1530; --crimson-glow:rgba(160,30,50,.4); --wine:#8B1A2B;
  --green:#00920a; --green-soft:rgba(0,146,10,.15);
  --tw:#fff; --tp:#E8ECF4; --ts:#8BA3C7; --tm:#4A6380;
  --td:#0A1628; --tds:#3A5070; --tdm:#7A8EA8;
  --bdr:rgba(5,117,166,.15); --bda:rgba(5,117,166,.4); --bdl:rgba(10,22,40,.08);
  --r4:5px; --r8:10px; --r16:20px; --r32:40px;
  --font:'Manrope',Arial,sans-serif;
  --sh-blue:0 0 40px rgba(5,117,166,.3);
  --sh-card:0 4px 24px rgba(2,14,36,.35);
  --sh-light:0 2px 16px rgba(10,22,40,.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg-deep);color:var(--tp);font-family:var(--font);line-height:1.6;font-weight:500;}

/* ── PROGRESS HEADER ─────────────────────────────── */
#prog-header {
  position:fixed; top:0; left:0; right:0; z-index:200;
  background:rgba(2,14,36,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--bdr);
  padding:0 24px;
}
.prog-top {
  max-width:860px; margin:0 auto;
  display:flex; align-items:center; gap:14px;
  height:56px;
}
.prog-logo {
  font-size:10px; font-weight:800; text-transform:uppercase;
  letter-spacing:2px; color:var(--tm); white-space:nowrap; flex-shrink:0;
}
.prog-logo span { color:var(--blue-b); }
.prog-bar-wrap { flex:1; }
.prog-track {
  height:4px; background:rgba(5,117,166,.15);
  border-radius:2px; overflow:hidden;
}
.prog-fill-bar {
  height:100%; border-radius:2px;
  background:linear-gradient(90deg,#0575a6,#00aaef);
  transition:width .5s cubic-bezier(.4,0,.2,1);
  width:0%;
}
.prog-steps-row {
  display:flex; gap:5px; margin-top:5px;
  max-width:860px; margin:5px auto 0;
  padding:0 0 8px;
}
.prog-dot {
  flex:1; height:3px; border-radius:2px;
  background:rgba(5,117,166,.12);
  transition:background .4s;
  cursor:pointer;
  position:relative;
}
.prog-dot.done { background:var(--blue-h); }
.prog-dot.active { background:var(--blue-b); box-shadow:0 0 6px var(--blue-b); }
.prog-dot:hover::after {
  content:attr(data-label);
  position:absolute; bottom:8px; left:50%;
  transform:translateX(-50%);
  background:var(--bg-card);
  border:1px solid var(--bda);
  color:var(--ts); font-size:10px; font-weight:700;
  padding:3px 8px; border-radius:var(--r4);
  white-space:nowrap; pointer-events:none;
}
.prog-counter {
  font-size:11px; font-weight:800; color:var(--tm);
  white-space:nowrap; flex-shrink:0;
}
.prog-counter span { color:var(--blue-b); }

/* ── STAGE CONTAINER ─────────────────────────────── */
#stage {
  position:fixed; top:80px; left:0; right:0; bottom:0;
  overflow:hidden;
}

/* ── CARD ────────────────────────────────────────── */
.card {
  position:absolute; inset:0;
  overflow-y:auto;
  opacity:0; pointer-events:none;
  transform:translateX(60px);
  transition:opacity .35s cubic-bezier(.4,0,.2,1),
             transform .35s cubic-bezier(.4,0,.2,1);
}
.card.active {
  opacity:1; pointer-events:all;
  transform:translateX(0);
}
.card.exit-left {
  opacity:0; pointer-events:none;
  transform:translateX(-60px);
  transition:opacity .3s cubic-bezier(.4,0,.2,1),
             transform .3s cubic-bezier(.4,0,.2,1);
}

.card-inner {
  max-width:640px; margin:0 auto;
  padding:32px 24px 120px;
}

/* ── CATEGORY BADGE ──────────────────────────────── */
.cat-badge {
  display:inline-flex; align-items:center; gap:6px;
  padding:4px 12px; border-radius:var(--r32);
  font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:1.5px;
  margin-bottom:16px;
}
.cat-badge.theory { background:var(--blue-soft); color:var(--blue-b); border:1px solid var(--bda); }
.cat-badge.practice { background:var(--coral-soft); color:var(--coral); border:1px solid rgba(215,96,96,.25); }
.cat-badge.task { background:var(--green-soft); color:#4ade80; border:1px solid rgba(0,146,10,.25); }
.cat-badge.life { background:rgba(122,21,48,.15); color:#c06080; border:1px solid rgba(122,21,48,.2); }

/* ── CARD HEADING ────────────────────────────────── */
.card-h {
  font-size:28px; font-weight:800; text-transform:uppercase;
  line-height:1.1; color:var(--tw); margin-bottom:6px;
}
.card-h span { color:var(--blue-b); }
.card-h.hero-h {
  font-size:52px; letter-spacing:1px; margin-bottom:4px;
}
@media(max-width:480px){ .card-h.hero-h{ font-size:36px; } }
  font-size:15px; color:var(--ts); line-height:1.7; margin-bottom:24px;
}
.c-line { display:block; width:50px; height:3px; background:var(--crimson); margin:10px 0 22px; }

/* ── QUOTE ───────────────────────────────────────── */
.q-block {
  border-left:3px solid var(--blue-b);
  padding:16px 20px; background:var(--bg-card);
  border-radius:0 var(--r16) var(--r16) 0;
  margin-bottom:18px;
}
.q-block.coral { border-left-color:var(--coral); }
.q-text { font-size:15px; font-style:italic; color:var(--tp); line-height:1.7; margin-bottom:5px; }
.q-src { font-size:11px; font-weight:700; color:var(--tm); text-transform:uppercase; letter-spacing:1px; }

/* ── INSIGHT BOX ─────────────────────────────────── */
.insight {
  text-align:center; padding:28px 24px;
  background:linear-gradient(135deg,var(--bg-card) 0%,rgba(5,117,166,.1) 100%);
  border-radius:var(--r16); border:1px solid var(--bda);
  margin-bottom:20px;
}
.insight .it { font-size:20px; font-weight:800; text-transform:uppercase; line-height:1.35; color:var(--tw); margin-bottom:7px; }
.insight .it span { color:var(--blue-b); }
.insight .is { font-size:14px; color:var(--ts); }

/* ── TAP QUESTION (первое действие) ─────────────── */
.tap-q {
  background:var(--bg-card);
  border:1.5px solid var(--bda);
  border-radius:var(--r16); padding:22px 20px;
  margin-bottom:18px;
}
.tap-q .tq-label {
  font-size:12px; font-weight:700; text-transform:uppercase;
  letter-spacing:1.5px; color:var(--blue-b); margin-bottom:12px;
}
.tap-q .tq-text { font-size:16px; font-weight:700; color:var(--tw); line-height:1.5; margin-bottom:16px; }
.tap-options { display:flex; flex-direction:column; gap:8px; }
.tap-opt {
  padding:12px 16px; border-radius:var(--r8);
  border:1.5px solid var(--bdr); background:var(--bg-panel);
  font-family:var(--font); font-size:14px; font-weight:600; color:var(--ts);
  cursor:pointer; text-align:left; transition:all .18s;
}
.tap-opt:hover { border-color:var(--blue-h); color:var(--tp); background:var(--blue-soft); }
.tap-opt.chosen { border-color:var(--blue-b); color:var(--blue-b); background:var(--blue-soft); }
.tap-result {
  margin-top:12px; padding:12px 16px; border-radius:var(--r8);
  background:rgba(0,170,239,.08); border:1px solid var(--bda);
  font-size:14px; color:var(--ts); line-height:1.6;
  display:none; animation:fadeUp .25s ease both;
}
.tap-result.show { display:block; }
.tap-result strong { color:var(--blue-b); }

/* ── MIXER ───────────────────────────────────────── */
.mixer-wrap {
  background:var(--bg-panel); border:1px solid var(--bdr);
  border-radius:var(--r16); padding:20px 16px 16px;
  margin-bottom:18px; overflow-x:auto;
}
.mixer-title { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--tm); text-align:center; margin-bottom:18px; }
.mixer-board { display:flex; gap:6px; justify-content:center; align-items:flex-end; min-width:380px; }
.fader-ch { display:flex; flex-direction:column; align-items:center; width:56px; cursor:pointer; opacity:.5; transition:opacity .2s; }
.fader-ch.active,.fader-ch:hover { opacity:1; }
.fader-ch.active .fader-fill { background:linear-gradient(180deg,#00aaef,#0575a6); }
.fader-ch.active .fader-grip { background:var(--blue-b); border-color:var(--blue-b); }
.fader-ch.active .fader-led { background:var(--blue-b); box-shadow:0 0 6px var(--blue-b); }
.fader-ch.active .fader-label,.fader-ch.active .fader-db { color:var(--blue-b); }
.fader-db { font-size:9px; font-weight:700; color:var(--tm); text-align:center; margin-bottom:3px; height:13px; }
.fader-track { width:6px; background:var(--bg-deep); border-radius:3px; height:80px; position:relative; border:1px solid rgba(5,117,166,.18); margin:0 auto 5px; }
.fader-fill { position:absolute; bottom:0; left:0; right:0; border-radius:3px; background:rgba(5,117,166,.25); transition:height .4s; }
.fader-grip { position:absolute; left:50%; transform:translateX(-50%); width:22px; height:8px; background:var(--bg-card); border:1.5px solid var(--bda); border-radius:3px; transition:bottom .4s; }
.fader-body { width:44px; background:var(--bg-card); border:1px solid var(--bdr); border-radius:var(--r8); padding:5px 4px; text-align:center; margin-bottom:4px; transition:border-color .2s; }
.fader-ch.active .fader-body { border-color:var(--blue-b); }
.fader-led { width:7px; height:7px; border-radius:50%; background:var(--tm); margin:0 auto 2px; }
.fader-ch-n { font-size:8px; font-weight:700; color:var(--tm); }
.fader-label { font-size:9px; font-weight:800; color:var(--tm); text-transform:uppercase; text-align:center; line-height:1.2; margin-bottom:2px; }
.fader-day { font-size:8px; color:rgba(74,99,128,.6); text-align:center; }
.mixer-desc { margin-top:12px; padding-top:11px; border-top:1px solid var(--bdr); font-size:13px; color:var(--ts); text-align:center; line-height:1.6; min-height:36px; }
.mixer-desc strong { color:var(--blue-b); }

/* ── TRIPOD ──────────────────────────────────────── */
.tripod-wrap { background:var(--bg-card); border:1px solid var(--bdr); border-radius:var(--r16); padding:20px 16px; margin-bottom:18px; text-align:center; position:relative; }
.tripod-svg-wrap { position:relative; display:inline-block; max-width:260px; width:100%; }
.tripod-svg-wrap svg { width:100%; }
.tripod-point { cursor:pointer; }
.tripod-point:hover circle.inner { filter:brightness(1.4); }
.t-tip { display:none; position:absolute; background:var(--bg-card); border:1.5px solid var(--bda); border-radius:var(--r8); padding:13px 15px; text-align:left; width:185px; z-index:50; box-shadow:var(--sh-card); }
.t-tip.show { display:block; animation:fadeUp .2s ease; }
.t-tip h5 { font-size:12px; font-weight:800; text-transform:uppercase; margin-bottom:4px; }
.t-tip p { font-size:12px; color:var(--ts); line-height:1.5; }
.t-tip .tt-tag { display:inline-block; margin-top:6px; padding:2px 9px; border-radius:20px; font-size:9px; font-weight:700; background:var(--blue-soft); color:var(--blue-b); text-transform:uppercase; }
.tripod-hint { font-size:12px; color:var(--tm); margin-top:8px; font-style:italic; }

/* ── TRY NOW (micro-action inside theory) ────────── */
.try-now {
  background:linear-gradient(135deg,rgba(5,117,166,.12),rgba(5,117,166,.04));
  border:1.5px solid var(--bda); border-radius:var(--r16);
  padding:18px 20px; margin-bottom:18px;
}
.try-now .tn-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:2px; color:var(--blue-b); margin-bottom:8px; }
.try-now .tn-text { font-size:15px; font-weight:700; color:var(--tw); line-height:1.5; margin-bottom:14px; }
.tn-btn {
  display:inline-flex; align-items:center; gap:7px;
  padding:10px 20px; border-radius:var(--r32);
  background:var(--blue-g); color:white;
  font-family:var(--font); font-size:13px; font-weight:800;
  text-transform:uppercase; letter-spacing:.5px;
  border:none; cursor:pointer; transition:opacity .2s;
}
.tn-btn:hover { opacity:.85; }
.tn-btn.done { background:linear-gradient(135deg,#00920a,#00b30d); }
.tn-reply { margin-top:12px; font-size:14px; color:var(--ts); line-height:1.6; display:none; animation:fadeUp .25s ease; }
.tn-reply.show { display:block; }
.tn-reply strong { color:#4ade80; }

/* ── STATES ──────────────────────────────────────── */
.states-nav { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
.st-btn { flex:1; min-width:90px; padding:8px 10px; border-radius:var(--r8); border:1.5px solid var(--bdr); background:var(--bg-panel); font-family:var(--font); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--tm); cursor:pointer; transition:all .18s; }
.st-btn:hover { border-color:var(--blue-h); color:var(--ts); }
.st-btn.on { background:var(--blue-soft); border-color:var(--blue-h); color:var(--blue-b); }
.st-btn.def.on { background:rgba(215,96,96,.1); border-color:var(--coral); color:var(--coral); }
.st-btn.exc.on { background:rgba(122,21,48,.15); border-color:#a04060; color:#c06080; }
.st-btn.mid.on { background:var(--green-soft); border-color:var(--green); color:#4ade80; }
.st-panel { background:var(--bg-card); border-radius:var(--r16); padding:20px 22px; border:1px solid var(--bdr); display:none; margin-bottom:18px; }
.st-panel.show { display:block; animation:fadeUp .2s ease; }
.st-icon { font-size:24px; margin-bottom:8px; }
.st-panel h4 { font-size:14px; font-weight:800; text-transform:uppercase; margin-bottom:6px; }
.st-panel p { font-size:14px; color:var(--ts); line-height:1.7; }
.st-impr { margin-top:10px; padding:8px 12px; border-radius:var(--r8); font-size:13px; font-weight:600; color:var(--ts); }

/* ── COMPARE TABLE ───────────────────────────────── */
.cmp-table { width:100%; border-collapse:separate; border-spacing:0; border-radius:var(--r16); overflow:hidden; border:1px solid var(--bdr); margin-bottom:18px; }
.cmp-table th { background:var(--bg-card); padding:11px 14px; text-align:left; font-size:11px; font-weight:800; color:var(--tw); border-bottom:2px solid var(--blue-h); text-transform:uppercase; letter-spacing:.8px; }
.cmp-table th.hl { background:var(--blue-soft); color:var(--blue-b); border-bottom-color:var(--blue-b); }
.cmp-table td { padding:10px 14px; font-size:13px; color:var(--ts); border-bottom:1px solid var(--bdr); background:var(--bg-dark); font-weight:500; }
.cmp-table tr:last-child td { border-bottom:none; }
.cmp-table td.hl { background:rgba(5,117,166,.06); }

/* ── SCIENCE ─────────────────────────────────────── */
.sci { background:var(--bg-panel); border:1px solid var(--bdr); border-radius:var(--r16); padding:16px 20px; margin-bottom:14px; display:flex; gap:13px; align-items:flex-start; }
.sci-ic { width:34px; height:34px; min-width:34px; border-radius:var(--r8); background:var(--blue-soft); border:1px solid var(--bda); display:flex; align-items:center; justify-content:center; font-size:15px; }
.sci h4 { font-size:12px; font-weight:800; color:var(--tp); text-transform:uppercase; margin-bottom:4px; }
.sci p { font-size:13px; color:var(--ts); line-height:1.6; }

/* ── TASK STEPS ──────────────────────────────────── */
.task-steps { background:var(--bg-card); border:1.5px solid var(--bda); border-radius:var(--r16); overflow:hidden; margin-bottom:16px; }
.ts-head { background:linear-gradient(90deg,rgba(5,117,166,.12),transparent); padding:13px 18px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--bdr); }
.ts-num { width:30px; height:30px; min-width:30px; border-radius:50%; background:var(--blue-g); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; color:#fff; }
.ts-head h3 { font-size:13px; font-weight:800; color:var(--tw); text-transform:uppercase; }
.ts-time { margin-left:auto; font-size:11px; font-weight:700; color:var(--tm); padding:2px 8px; background:var(--bg-panel); border-radius:20px; }
.ts-body { padding:14px 18px; }
.ts-step { display:flex; gap:10px; margin-bottom:10px; }
.ts-n { width:20px; height:20px; min-width:20px; border-radius:var(--r4); background:var(--wine); display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:800; color:#fff; margin-top:2px; }
.ts-step p { font-size:14px; color:var(--ts); line-height:1.6; }
.ts-step p strong { color:var(--tp); font-weight:700; }

/* ── WORKBOOK FIELDS ─────────────────────────────── */
.wb-wrap { background:var(--bg-light); border-radius:var(--r16); overflow:hidden; border:1px solid var(--bdl); box-shadow:var(--sh-light); margin-bottom:18px; color:var(--td); }
.wb-head { background:var(--bg-light-warm); padding:12px 18px; border-bottom:1px solid var(--bdl); display:flex; align-items:center; justify-content:space-between; }
.wb-head-t { font-size:13px; font-weight:700; color:var(--td); display:flex; align-items:center; gap:8px; }
.wb-badge { font-size:10px; font-weight:700; padding:2px 9px; border-radius:20px; background:var(--blue); color:#fff; text-transform:uppercase; }
.wb-badge.c { background:var(--coral-d); }
.wb-body { padding:18px; }
.wb-f { margin-bottom:14px; }
.wb-f label { display:block; font-size:11px; font-weight:700; color:var(--blue); text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px; }
.wb-f textarea { width:100%; min-height:68px; border:1.5px solid #d0d8e8; border-radius:var(--r8); padding:9px 12px; font-family:var(--font); font-size:14px; color:var(--td); background:var(--bg-light-warm); resize:vertical; outline:none; transition:border-color .2s; }
.wb-f textarea:focus { border-color:var(--blue); }
.wb-f textarea::placeholder { color:var(--tdm); font-style:italic; }
.wb-hint { font-size:12px; color:var(--tdm); margin-top:4px; font-style:italic; }

/* ── SCALE ───────────────────────────────────────── */
.scale-nums { display:flex; gap:4px; flex-wrap:wrap; }
.sn { width:32px; height:32px; border-radius:var(--r8); border:1.5px solid #d0d8e8; background:var(--bg-light-warm); font-family:var(--font); font-size:13px; font-weight:800; color:var(--tdm); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; }
.sn:hover { border-color:var(--blue); color:var(--blue); }
.sn.on { background:var(--blue); border-color:var(--blue); color:#fff; }
.scale-res { margin-top:9px; font-size:14px; font-weight:600; color:var(--tds); display:none; padding:9px 12px; background:#eef8ff; border-radius:var(--r8); border-left:3px solid var(--blue); }
.scale-res.show { display:block; animation:fadeUp .25s ease; }

/* ── CHECKLIST ───────────────────────────────────── */
.ck-list { list-style:none; }
.ck-item { display:flex; align-items:flex-start; gap:10px; padding:9px 0; border-bottom:1px solid var(--bdl); font-size:14px; font-weight:500; color:var(--td); cursor:pointer; user-select:none; transition:opacity .2s; }
.ck-item:last-child { border-bottom:none; }
.ck-item.done { opacity:.45; text-decoration:line-through; color:var(--tdm); }
.ck-box { width:21px; height:21px; min-width:21px; border-radius:5px; border:2px solid var(--blue); display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; transition:background .15s; }
.ck-box.on { background:var(--blue); }
.ck-box.on::after { content:'✓'; color:#fff; font-size:11px; font-weight:800; }

/* ── CONCEPT CARDS ───────────────────────────────── */
.cc { background:var(--bg-card); border:1px solid var(--bda); border-radius:var(--r16); padding:18px 22px; margin-bottom:14px; position:relative; overflow:hidden; transition:box-shadow .2s; }
.cc::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--blue-g); }
.cc:hover { box-shadow:var(--sh-blue); }
.cc .cn { width:32px; height:32px; border-radius:var(--r8); background:var(--wine); color:#fff; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800; margin-bottom:9px; }
.cc h3 { font-size:14px; font-weight:800; color:var(--tw); text-transform:uppercase; margin-bottom:5px; }
.cc p { font-size:13px; color:var(--ts); line-height:1.7; }

      <div class="fader-label">${d.label}</div>
      <div class="fader-day">${d.day}</div>
    </div>
  `).join('');
}

let cur = 0;
const total = STEPS.length;

// Build progress dots
const dotsEl = document.getElementById('progDots');
STEPS.forEach((s,i)=>{
  const d = document.createElement('div');
  d.className = 'prog-dot';
  d.dataset.label = s.label;
  d.onclick = ()=>{ if(i<=cur) jumpTo(i); };
  dotsEl.appendChild(d);
});
document.getElementById('progTotal').textContent = total;

// Build all cards
const stage = document.getElementById('stage');
const cards = [];
STEPS.forEach((s,i)=>{
  const el = document.createElement('div');
  el.className = 'card';
  el.id = 'card-'+i;
  el.innerHTML = `<div class="card-inner">${s.render()}</div>`;
  stage.appendChild(el);
  cards.push(el);
});

const NEXT_LABELS = [
  'Как это связано с уверенностью? →',
  'Как устроена тройная опора? →',
  'А есть ли разница — много или мало? →',
  'Есть ли разница у мужчин и женщин? →',
  'А как это работает, когда я сижу? →',
  'Готов(а) попробовать на себе →',
  'Снимаю видео стоя →',
  'Снимаю видео сидя →',
  'Разобраться что увидел(а) стоя →',
  'Записать наблюдения сидя →',
  'Сохранить мои ответы →',
  'Что делать с этим в жизни? →',
  '🎉 День 1 завершён!',
];

function updateProgress(){
  const pct = ((cur+1)/total)*100;
  document.getElementById('progFill').style.width = pct+'%';
  document.getElementById('progCur').textContent = cur+1;
  const dots = dotsEl.querySelectorAll('.prog-dot');
  dots.forEach((d,i)=>{
    d.classList.remove('active','done');
    if(i<cur) d.classList.add('done');
    if(i===cur) d.classList.add('active');
  });
  document.getElementById('btnBack').disabled = cur===0;
  const isLast = cur===total-1;
  const next = document.getElementById('btnNext');
  if(isLast){
    next.textContent = '🎉 День 1 завершён!';
    next.disabled = true;
    next.className = 'fn-next';
  } else {
    next.innerHTML = NEXT_LABELS[cur] || (STEPS[cur+1].label+' →');
    next.disabled = false;
    next.className = 'fn-next';
    if(STEPS[cur+1] && STEPS[cur+1].cat==='theory') next.classList.add('blue-next');
  }
}

function showCard(idx, dir){
  cards.forEach((c,i)=>{
    if(i===idx){ c.className='card active'; c.scrollTop=0; }
    else if(dir>0 && i===idx-1){ c.className='card exit-left'; }
    else { c.className='card'; }
  });
  updateProgress();
  // init per-card interactions
  setTimeout(()=>{
    initCard(idx);
  }, 50);
}

function go(dir){
  const next = cur + dir;
  if(next<0 || next>=total) return;
  cur = next;
  showCard(cur, dir);
}

function jumpTo(idx){
  const dir = idx>cur?1:-1;
  cur=idx;
  showCard(cur,dir);
}

    const st = document.getElementById('scaleTrack');

function activateFader(el){
  document.querySelectorAll('.fader-ch').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  const idx=parseInt(el.dataset.ch);
  const desc=document.getElementById('mixerDesc');
  if(desc) desc.innerHTML='<strong>Канал '+(idx+1)+' — '+MIXER_DATA[idx].label+'</strong> · '+MIXER_DESC[idx];
}
function peekFader(el){
  const idx=parseInt(el.dataset.ch);
  const desc=document.getElementById('mixerDesc');
  if(desc){
    el.style.opacity='0.9';
    desc.innerHTML='<span style="color:var(--tm)">Канал '+(idx+1)+' — '+MIXER_DATA[idx].label+'</span> · <span style="color:var(--tm)">'+MIXER_DESC[idx]+'</span>';
  }
}
function unpeekFader(el){
  el.style.opacity='';
  const desc=document.getElementById('mixerDesc');
  if(desc) desc.innerHTML='<strong>Канал 1 — Опора</strong> · Ваша связь с поверхностью. Фундамент, на котором стоит всё остальное. <strong>Сегодняшний урок.</strong>';
}

function showTip(name,svgX,svgY){
  document.querySelectorAll('.t-tip').forEach(t=>t.classList.remove('show'));
  if(activeTip===name){activeTip=null;return;}
  activeTip=name;
  const tt=document.getElementById('tt-'+name);
  const wrap=document.getElementById('tripodWrap');
  if(!tt||!wrap) return;
  const wR=wrap.getBoundingClientRect();
  const svg=wrap.querySelector('svg');
  const sR=svg.getBoundingClientRect();
  const sx=sR.width/260, sy=sR.height/340;
  const px=sR.left-wR.left+svgX*sx;
  const py=sR.top-wR.top+svgY*sy;
  tt.style.left=Math.min(Math.max(px-92,0),wR.width-195)+'px';
  const above=py-145;
  tt.style.top=(above>8?above:py+28)+'px';
  tt.classList.add('show');
}
document.addEventListener('click',function(e){
  if(!e.target.closest('.tripod-point')&&!e.target.closest('.t-tip')){
    document.querySelectorAll('.t-tip').forEach(t=>t.classList.remove('show'));
    activeTip=null;
  }
});

function showSt(name){
  document.querySelectorAll('.st-panel').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.st-btn').forEach(b=>b.classList.remove('on'));
  const panel=document.getElementById('sp-'+name);
  if(panel) panel.classList.add('show');
  const map={usual:0,deficit:1,excess:2,normal:3};
  const btns=document.querySelectorAll('.st-btn');
  if(btns[map[name]]) btns[map[name]].classList.add('on');
}

function tryDone(wrapId,btnId,replyId){
  const btn=document.getElementById(btnId);
  const reply=document.getElementById(replyId);
  if(btn){ btn.classList.add('done'); btn.textContent='✓ Готово!'; btn.onclick=null; }
  if(reply) reply.classList.add('show');
}

function chooseOpt(stepIdx, key){
  const s=STEPS[stepIdx];
  if(!s||!s.tapResults) return;
  const qid='tapQ'+stepIdx;
  const trid='tr'+stepIdx;
  const wrap=document.getElementById(qid);
  const res=document.getElementById(trid);
  if(!wrap||!res) return;
  wrap.querySelectorAll('.tap-opt').forEach(b=>b.classList.remove('chosen'));
  const opts=wrap.querySelectorAll('.tap-opt');
  const keys=Object.keys(s.tapResults);
  const ki=keys.indexOf(key);
  if(opts[ki]) opts[ki].classList.add('chosen');
  res.innerHTML=s.tapResults[key];
  res.classList.add('show');
}
